# =============================================================================
# market-notifier, Application Configuration
# Spring Boot 4.0 | Java 21
#
# ALL infrastructure addresses, topic names, thresholds, and tuning parameters
# live here. No magic strings or hardcoded values in Java classes.
# Injected into Java via @Value("${...}") or @ConfigurationProperties.
# =============================================================================

spring.application.name=market-notifier

# ---------------------------------------------------------------------------
# KAFKA CONFIGURATION
# Spring Boot's autoconfiguration reads these and wires up KafkaTemplate
# and @KafkaListener automatically, no manual factory beans needed for basics.
# ---------------------------------------------------------------------------

# Where to find the Kafka broker. Matches PLAINTEXT_HOST listener in compose.yaml.
spring.kafka.bootstrap-servers=localhost:9092

# --- Producer ---
# NOTE: Producer serializers, acks, and retries are configured MANUALLY
# in KafkaConfig.java (ProducerFactory bean) because we need a typed
# KafkaTemplate<String, PriceEvent>. Do NOT add spring.kafka.producer.*
# serializer/acks/retries properties here — they would be silently ignored
# by the manual bean and create confusion about which config is active.

# --- Consumer ---
# Consumer group ID. All consumers with the same group ID share the work
# of processing messages, Kafka ensures each partition is only consumed
# by ONE consumer in the group at a time.
spring.kafka.consumer.group-id=market-notifier-group

# What to do when this consumer group has no committed offset yet
# (i.e., first time it ever runs). "earliest" means start from the
# very first message in the topic. "latest" means start from new messages only.
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Deserialize JSON bytes back into our PriceEvent Java object.
# We wrap with ErrorHandlingDeserializer so that a single bad message
# doesn't crash the entire consumer — it logs the error and moves on.
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# --- Consumer Properties (Specific Deserializer Config) ---

# The ErrorHandlingDeserializer delegates to the real deserializer below.
# JacksonJsonDeserializer uses Jackson 3.x (tools.jackson), matching the
# JacksonJsonSerializer used by our producer in KafkaConfig.java.
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JacksonJsonDeserializer

# Security: only allow deserialization of classes from our own package.
# Without this, a malicious Kafka message could potentially deserialize
# into any class on the classpath, a known Java deserialization attack vector.
spring.kafka.consumer.properties.spring.json.trusted.packages=com.dumanch1.marketnotifier.model

# Tell the deserializer which Java class the incoming JSON maps to.
# This lets us receive PriceEvent objects directly in @KafkaListener methods.
spring.kafka.consumer.properties.spring.json.value.default.type=com.dumanch1.marketnotifier.model.PriceEvent

# ---------------------------------------------------------------------------
# REDIS CONFIGURATION
# Spring Data Redis (Lettuce client) reads these automatically.
# ---------------------------------------------------------------------------
spring.data.redis.host=localhost
spring.data.redis.port=6379

# timeout: how long to wait for a Redis command to complete
spring.data.redis.timeout=2000ms

# Connection pool settings for Lettuce (the Redis driver)
# max-active: max simultaneous connections
# min-idle: keep at least this many connections open and warm
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.min-idle=2

# ---------------------------------------------------------------------------
# ACTUATOR CONFIGURATION
# Controls which /actuator/* endpoints are exposed over HTTP.
# ---------------------------------------------------------------------------

# Expose these endpoints. '*' = all, but we're explicit for clarity.
# health: is the app alive?
# metrics: JVM, Kafka consumer lag, Redis pool stats
# info: app name and version
management.endpoints.web.exposure.include=health,metrics,info

# "always" shows full health detail (UP/DOWN + component breakdown).
# In production you'd restrict this, but for dev it's very useful.
management.endpoint.health.show-details=always

# ---------------------------------------------------------------------------
# APPLICATION-SPECIFIC CONFIGURATION
# Our own custom properties. Injected into services via @Value.
# ---------------------------------------------------------------------------

# The Kafka topic name for Bitcoin price events.
# Used in KafkaConfig (topic creation) and producer/consumer.
app.kafka.topic=crypto-prices

# Binance public WebSocket endpoint base URL.
# We build the combined stream URL dynamically from the symbols list below.
app.binance.websocket-base-url=wss://stream.binance.com:9443

# List of cryptocurrency symbols to track (all lowercase for Binance API).
# Format: <base><quote> e.g. "btcusdt" = BTC/USDT pair
# IMPORTANT: In .properties files, lists must be COMMA-SEPARATED (not indexed like [0], [1]).
# Spring will automatically split this string on commas and inject as List<String>.
# You can add/remove symbols here without touching any Java code.
app.binance.symbols=btcusdt,ethusdt,solusdt,bnbusdt,xrpusdt,adausdt

# Minimum price change percentage to trigger a "Smart Alert"
# 1.0 means: if BTC price moved more than 1% in the time window, alert.
app.alert.threshold-percent=1.0

# The rolling time window to look back when calculating price change.
# 60 seconds: "did BTC move more than 1% in the last 60 seconds?"
app.alert.window-seconds=60

# How many recent alerts to keep stored in Redis (for the REST endpoint)
app.alert.max-history=100
# Cooldown: how many seconds a trend must go without a new price extreme
# before we consider it "settled" and send a summary notification.
# 120 = 2 minutes. Lower = faster notifications. Higher = more data in summary.
app.alert.cooldown-seconds=120

# ---------------------------------------------------------------------------
# LOGGING
# Control log verbosity per package.
#
# Levels: TRACE > DEBUG > INFO > WARN > ERROR
# root=INFO  → Spring Boot startup/shutdown messages visible
# app=WARN   → only Smart Alerts and errors (hides per-tick DEBUG noise)
# ---------------------------------------------------------------------------
logging.level.root=INFO
# Our application: WARN shows only alerts (log.warn) and errors.
# Change to DEBUG when you need to troubleshoot the price pipeline.
logging.level.com.dumanch1.marketnotifier=WARN
# Spring Kafka internals — WARN to silence rebalance/partition chatter
logging.level.org.springframework.kafka=WARN
# Apache Kafka client library — WARN to suppress AdminClient/NetworkClient INFO noise
logging.level.org.apache.kafka=WARN
# Reduce noise from Netty (the WebSocket/HTTP client underneath WebFlux)
logging.level.io.netty=WARN
logging.level.reactor.netty=WARN

# ---------------------------------------------------------------------------
# TELEGRAM NOTIFICATIONS
# Send Smart Alerts to a Telegram chat via the Bot API.
# Disabled by default — set enabled=true and provide your bot token + chat ID.
#
# How to set up:
# 1. Message @BotFather on Telegram → /newbot → copy the token
# 2. Send any message to your bot
# 3. Open https://api.telegram.org/bot<TOKEN>/getUpdates to find your chat ID
# 4. Set the values below (or use environment variables)
#
# SECURITY: Do NOT commit real tokens to Git. Use environment variables:
#   APP_TELEGRAM_BOT_TOKEN=your-token
#   APP_TELEGRAM_CHAT_ID=your-chat-id
# ---------------------------------------------------------------------------
app.telegram.enabled=false
app.telegram.bot-token=${APP_TELEGRAM_BOT_TOKEN:}
app.telegram.chat-id=${APP_TELEGRAM_CHAT_ID:}